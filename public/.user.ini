; Server-level limits — intentionally high.
; The application-layer payment system (VideoUploadFee) is the real gatekeeper.
; These values just ensure the file can physically reach PHP before the app checks it.
upload_max_filesize = 5120M
post_max_size       = 5120M
max_execution_time  = 600
max_input_time      = 600
memory_limit        = 512M
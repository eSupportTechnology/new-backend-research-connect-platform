# ── Paste these lines inside your server { } block in nginx ──────────────────
#
# File: /etc/nginx/sites-available/resurch-api  (or wherever your vhost lives)
#
# After editing, run:  sudo nginx -t && sudo systemctl reload nginx

# IMPORTANT: These limits are intentionally large.
# The payment system (VideoUploadFee) is the application-layer gatekeeper for video size.
# If nginx/PHP limits are lower than the largest paid video allowed, those users
# will be blocked by the server BEFORE the app can even check payment — so keep these high.

client_max_body_size    5120M;  # 5 GB — must be >= PHP post_max_size
client_body_timeout     600s;   # 10 min for slow connections uploading large files
client_header_timeout   60s;

# ── FastCGI timeouts (PHP-FPM) ────────────────────────────────────────────────
fastcgi_read_timeout    600s;   # 10 min — S3 upload + processing can take time
fastcgi_send_timeout    600s;
fastcgi_connect_timeout 60s;

# ── Buffer settings — stream large uploads to disk instead of RAM ─────────────
client_body_buffer_size     128k;
client_body_temp_path       /tmp/nginx_uploads;